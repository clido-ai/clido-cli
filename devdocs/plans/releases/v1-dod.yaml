  # --- CLI spec §4 First-Run and Onboarding: interactive setup behavior ---
  - id: first-run-interactive
    description: "No config + TTY: interactive setup runs (ask provider, API key/env, write config)"
    source: "CLI spec §4 Auto-detection on first run"
    verification:
      type: command
      command: "cargo test -p clido-cli --test integration first_run_interactive"
    status: DONE

  - id: init-interactive-same-flow
    description: "clido init runs the same interactive setup flow (provider, key/URL, write config)"
    source: "CLI spec §4 clido init"
    verification:
      type: command
      command: "cargo test -p clido-cli --test integration init_interactive_writes_config"
    status: DONE

  - id: first-run-non-interactive
    description: "No config + non-TTY: exit 2 with message to run clido init"
    source: "CLI spec §4 Non-interactive first run"
    verification:
      type: command
      command: "set +e; (d=$(pwd) && cd /tmp && CLIDO_CONFIG=/nonexistent/clido/config.toml \"$d/target/debug/clido\" -p hello 2>/dev/null); e=$?; set -e; [ \"$e\" -eq 2 ]"
    status: DONE

  - id: cli-doctor
    description: "clido doctor runs (exit 0 or 1); V1 checks API key, session dir, pricing.toml"
    source: "v1.md Exit Criteria; v1.md Release boundaries"
    verification:
      type: cli
      argv: ["doctor"]
      expect_exit: [0, 1]
    status: DONE

  # --- Release boundaries: unsupported provider (v1.md Release boundaries) ---
  - id: unsupported-provider
