  - id: subagents-isolated
    description: "Subagents can run isolated reasoning tasks without destabilizing or corrupting the parent session"
    source: "v3.md Exit Criteria; Phase 4.7"
    verification:
      type: command
      command: "cargo test -p clido-agent subagent"
    status: DONE

