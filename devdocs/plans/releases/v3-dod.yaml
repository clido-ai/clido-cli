# V3 Definition of Done — machine-readable checklist (detailed).
# Source plan: v3.md. Run scripts/verify-dod.sh when CURRENT is v3.
release: v3
source_plan: v3.md

items:
  # --- Build and test (inherited) ---
  - id: build
    description: "Workspace builds for all targets"
    source: "v3.md builds on V2"
    verification:
      type: command
      command: "cargo build --all-targets"
    status: DONE

  - id: tests
    description: "All workspace tests pass"
    source: "v3.md builds on V2"
    verification:
      type: command
      command: "cargo test --workspace"
    status: DONE

  - id: coverage-workspace
    description: "Workspace line coverage >= 78% (V3 floor)"
    source: "development-plan Phase 5.4.2"
    verification:
      type: coverage
      scope: workspace
      min_percent: 78
    status: DONE

