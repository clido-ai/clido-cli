  - id: build
    description: "Workspace builds for all targets"
    source: "v4.md builds on V3"
    verification:
      type: command
      command: "cargo build --all-targets"
    status: GAP
    gap_reason: "V4 not yet released"

  - id: tests
    description: "All workspace tests pass"
    source: "v4.md builds on V3"
    verification:
      type: command
      command: "cargo test --workspace"
    status: GAP
    gap_reason: "V4 not yet released"

  - id: coverage-workspace
    description: "Workspace line coverage >= 82% (V4 floor)"
    source: "development-plan Phase 5.4.2"
    verification:
      type: coverage
      scope: workspace
      min_percent: 82
    status: GAP
    gap_reason: "V4 not yet released"

