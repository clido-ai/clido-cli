[default]
exclude-files = [
    "crates/clido-cli/src/tui/*",
    "crates/clido-cli/src/repl.rs",
    "crates/clido-cli/src/main.rs",
    "crates/clido-cli/src/audit_cmd.rs",
    "crates/clido-cli/src/checkpoint_cmd.rs",
    "crates/clido-cli/src/commit.rs",
    "crates/clido-cli/src/index_cmd.rs",
    "crates/clido-cli/src/memory_cmd.rs",
    "crates/clido-cli/src/plan_cmd.rs",
    "crates/clido-cli/src/sessions.rs",
    "crates/clido-cli/src/stats.rs",
    "crates/clido-cli/src/workflow.rs",
    "crates/clido-cli/src/run.rs",
    "crates/clido-cli/src/cli.rs",
    "crates/clido-cli/src/agent_setup.rs",
    "crates/clido-cli/src/notify.rs",
    "crates/clido-cli/src/pricing_cmd.rs",
    "crates/clido-tools/src/mcp.rs",
    # setup/ is mostly TUI ratatui rendering (draw_setup, draw_provider, draw_model,
    # draw_credential, draw_text_input, setup_event_loop, run_tui_setup_blocking,
    # run_tui_setup, run_interactive_setup_blocking, write_setup_config) — requires a
    # real terminal / TTY; the pure-logic helpers are already tested via #[cfg(test)].
    "crates/clido-cli/src/setup/*",
    # profiles.rs dispatches CLI subcommands that invoke interactive setup — requires TTY.
    "crates/clido-cli/src/profiles.rs",
    # registry.rs is pure static data declarations with no executable logic to test.
    "crates/clido-providers/src/registry.rs",
    # Large HTTP/SDK adapters: exercised via integration tests and manual QA; unit tests would
    # duplicate mock servers without raising confidence in the real wire format.
    "crates/clido-providers/src/openai.rs",
    "crates/clido-providers/src/anthropic.rs",
    # Main turn loop: thousands of branches; behavior is covered by `#[cfg(test)]` scenarios in this
    # file plus `crates/clido-agent/tests/*.rs`. Tarpaulin otherwise dominates the denominator with
    # interactive paths that are impractical to hit in one CI run.
    "crates/clido-agent/src/agent_loop/mod.rs",
]
fail-under = 80.0
