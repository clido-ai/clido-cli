      You are performing a systematic scan against known Solidity attack vectors.
      For each category below, check whether the pattern applies to this codebase
      by reading the relevant code. Only flag patterns you can confirm by reading code.

      ═══════════════════════════════════════════════════════════════
      VECTOR CHECKLIST
      ═══════════════════════════════════════════════════════════════

      [ERC TOKEN STANDARD VIOLATIONS]
      V-ERC-01: ERC20 transfer() returns false instead of reverting — does the protocol
                check return values, or use SafeERC20?
      V-ERC-02: Fee-on-transfer ERC20 — does the protocol account for tokens where
                received amount < sent amount? Look for balance delta checks.
      V-ERC-03: Rebasing/elastic supply tokens — does any vault/pool assume a fixed
                balance per share, which fails with rebasing tokens?
      V-ERC-04: ERC20 decimals() — does the protocol assume 18 decimals? Check with
                tokens like USDC (6) or WBTC (8).
      V-ERC-05: Non-standard ERC20 (no return on transfer, USDT-style) — does code
                use raw transfer() without SafeERC20 wrapper?
      V-ERC-06: ERC4626 rounding direction — does convertToShares round down and
                convertToAssets round up (required)? Violation enables share inflation.

      [ORACLE VULNERABILITIES]
      V-ORC-01: Chainlink staleness — is updatedAt checked against a max age threshold?
      V-ORC-02: Chainlink min/maxAnswer circuit breaker — does the protocol handle
                the case where the price feed hits its configured min or max answer?
      V-ORC-03: L2 Sequencer uptime — for Optimism/Arbitrum, is the sequencer uptime
                feed checked before using Chainlink prices?
      V-ORC-04: Spot price manipulation — does the protocol read AMM spot prices
                (slot0, getReserves) in the same transaction where liquidity can be moved?
      V-ORC-05: Negative Chainlink price — does the code handle the case where a
                price feed returns a negative int256?

      [REENTRANCY VARIANTS]
      V-RE-01: Classic reentrancy — state updated after external call, no lock
      V-RE-02: Cross-function reentrancy — two functions share state, only one is locked
      V-RE-03: Read-only reentrancy — view function reads inconsistent state during callback
      V-RE-04: ERC1155 batch callback reentrancy — onERC1155BatchReceived re-enters
      V-RE-05: Transient storage as reentrancy lock — cleared in all paths including reverts?

      [GOVERNANCE ATTACKS]
      V-GOV-01: Flash loan governance: can an attacker borrow governance tokens, vote,
                and repay in one tx? Is voting power snapshot at proposal creation time?
      V-GOV-02: Proposal sandwich: can an attacker front-run a governance execution
                to be in a better position when the change takes effect?
      V-GOV-03: Timelock bypass: is there any path that skips the timelock?

      [NUMERIC EDGE CASES]
      V-NUM-01: Silent integer overflow in unchecked block — values from user input
      V-NUM-02: Division before multiplication: (a/b)*c loses precision
      V-NUM-03: Unsafe downcast: uint128(x) where x can exceed uint128 max
      V-NUM-04: Dirty higher-order bits in assembly: does assembly pack/unpack values
                without proper masking (e.g., shr(96, shl(96, addr)) )?

      [PROXY / UPGRADE PATTERNS]
      V-PRX-01: Uninitialized implementation contract — can initialize() be called directly?
      V-PRX-02: Storage collision between proxy admin slot and implementation data
      V-PRX-03: Delegatecall to user-controlled address
      V-PRX-04: UUPS: is upgradeTo() protected on the implementation contract?

      [SIGNATURE SCHEMES]
      V-SIG-01: ecrecover returns zero address on invalid signature — is address(0) checked?
      V-SIG-02: Missing nonce — same signature replayable multiple times
      V-SIG-03: Missing deadline — expired signatures accepted indefinitely
      V-SIG-04: Wrong DOMAIN_SEPARATOR — missing chainId or contract address
      V-SIG-05: Permit frontrun griefing — user's tx fails if permit consumed by attacker

      [LIBRARY / DEPENDENCY RISKS]
      V-LIB-01: Solmate SafeTransferLib — does NOT check contract existence;
                transferring to an EOA succeeds even if the ERC20 is not yet deployed
      V-LIB-02: OpenZeppelin version — check for known CVEs in the version used
                (preflight should have captured the version)
      V-LIB-03: Unofficial fork of a library — any git submodule pointing to a non-official fork?

      [CROSS-CHAIN]
      V-XC-01: Missing source chain verification in message handler
      V-XC-02: Missing sender address verification in message handler
      V-XC-03: Message replay possible (no nonce or message ID)
      V-XC-04: Supply cap not enforced across chains

      [MISCELLANEOUS]
      V-MISC-01: Block timestamp dependence — is block.timestamp used for randomness
                 or as a precise timer (±12s is exploitable)?
      V-MISC-02: tx.origin used for authentication — vulnerable to phishing attacks
      V-MISC-03: Hardcoded gas limit in external calls — may break with EVM upgrades
      V-MISC-04: Incorrect event emission — events emitted with wrong values mislead
                 off-chain indexers that systems depend on

      ═══════════════════════════════════════════════════════════════
      INSTRUCTIONS
      ═══════════════════════════════════════════════════════════════

      For each vector ID above:
      1. Determine if it is APPLICABLE to this codebase (based on intel.json)
      2. If applicable: read the relevant code section and determine PRESENT/ABSENT/PARTIAL
      3. If PRESENT (vulnerability exists): create a narrative entry
      4. If ABSENT (properly guarded): mark as checked/clean
      5. If NOT APPLICABLE (e.g., no Chainlink): skip

      Focus your reading on the highest-risk entries: V-ERC-02, V-ORC-01, V-ORC-02,
      V-RE-01, V-RE-03, V-PRX-01, V-SIG-01, V-SIG-02, V-LIB-01, V-GOV-01.

      OUTPUT: Valid JSON only.

      {
        "scan_summary": {
          "total_vectors_checked": 0,
          "applicable": 0,
          "confirmed_vulnerable": 0,
          "confirmed_clean": 0,
          "not_applicable": 0
        },
        "findings": [
          {
            "id": "VSCAN-01",
            "vector_id": "V-ERC-02",
            "title": "Fee-on-transfer token handling in deposit()",
            "angle": "vector_scan",
            "status": "vulnerable|clean|partial",
            "entry_point": "ContractName.sol:functionName():L123",
            "attacker": "unprivileged EOA using a fee-on-transfer token",
            "preconditions": [],
            "preconditions_reachable": "",
            "steps": [],
            "root_cause": "one precise sentence",
            "estimated_profit": "dust|small|medium|large",
            "confidence": "high|medium|low",
            "code_ref": "file:line"
          }
        ],
        "clean_checks": [
          {"vector_id": "V-ORC-01", "note": "updatedAt checked at src/Oracle.sol:L45"}
        ],
        "skipped": [
          {"vector_id": "V-XC-01", "reason": "no cross-chain components found"}
        ]
      }

  # ───────────────────────────────────────────────────────────────────────────
  # STAGE 3 · Deep Investigation
  # Read all 10 narrative files + actual code. Validate or kill each narrative.
  # Uses Opus for best reasoning. Reads code for every claim it makes.
  # ───────────────────────────────────────────────────────────────────────────
  - id: investigation
    name: "Stage 3 · Deep Investigation"
    profile: opus
    tools: ["read", "glob", "bash"]
    max_turns: 60
    system_prompt: |
      You are a senior Solidity security researcher performing deep technical
      investigation. You ALWAYS verify claims by reading the actual code.
      You never assume access control is absent — you read and confirm.
      You are rigorous and conservative: if you cannot confirm an attack path
      works by reading the code, you mark it implausible.
    outputs:
      - name: output
        type: text
        save_to: "{{ inputs.repo_path }}/.clido-audit/investigation.json"
    prompt: |
      Repository: {{ inputs.repo_path }}

      You are investigating attack narratives generated by specialized agents.
      Read each narrative file, then for each narrative read the actual source code
      and determine whether the attack is technically sound.

      NARRATIVE FILES TO INVESTIGATE (read each; skip if file does not exist):
      - {{ inputs.repo_path }}/.clido-audit/narratives/imagine_capital.json
      - {{ inputs.repo_path }}/.clido-audit/narratives/imagine_ordering.json
      - {{ inputs.repo_path }}/.clido-audit/narratives/imagine_access.json
      - {{ inputs.repo_path }}/.clido-audit/narratives/imagine_math.json
      - {{ inputs.repo_path }}/.clido-audit/narratives/imagine_external.json
      - {{ inputs.repo_path }}/.clido-audit/narratives/imagine_state.json
      - {{ inputs.repo_path }}/.clido-audit/narratives/imagine_crosschain.json
      - {{ inputs.repo_path }}/.clido-audit/narratives/imagine_signatures.json
      - {{ inputs.repo_path }}/.clido-audit/narratives/imagine_upgrades.json
      - {{ inputs.repo_path }}/.clido-audit/narratives/vector_scan.json

      Also read intent gaps for additional context:
      - {{ inputs.repo_path }}/.clido-audit/intent_gaps.json

      PRIORITIZATION: First investigate narratives with confidence: "high", then
      "medium", then "low". Within each group, prioritize estimated_profit: "large"
      then "medium". This ensures the most impactful findings get deepest scrutiny.

      INVESTIGATION METHODOLOGY for each narrative:

      1. READ the target code (file:lines cited in the narrative)
      2. READ all modifiers on the entry point function
      3. READ all functions called in the attack path (follow the call tree at least 2 levels)
      4. Verify each precondition is reachable through normal protocol interactions
      5. Trace each attack step and verify it produces the claimed effect
      6. Check for guards that prevent the attack (require statements, modifiers, checks)
      7. Estimate realistic profit magnitude
      8. Cross-check: does any other narrative from a different angle confirm the same bug?
         If so, note the correlation — corroborated findings have higher confidence.

      STRICT VALIDATION RULES — ALL must hold for verdict: exploitable:

      ATTACKER: Must be completely unprivileged. No admin keys, oracle control, validator access.

      REACHABILITY: Every precondition must be achievable via normal protocol interactions.
      If you cannot trace how to reach the required state → implausible.

      DETERMINISM: Attack must be reproducible. No reliance on block timestamps beyond ±12s,
      no impossible race conditions.

      REAL DAMAGE: Must be one of:
        - Token or ETH theft from protocol or users
        - Permanent insolvency of the protocol
        - Unauthorized minting of protocol tokens
      NOT acceptable: temporary imbalance that self-corrects, rounding dust, UI issues,
      admin behavioral risks.

      NOT A DESIGN CHOICE: Check NatSpec, README, and inline comments. If the docs say
      this behavior is intentional, it is not a bug.

      FINANCIAL MATERIALITY: Profit must be meaningful. Dust-level attacks are at most
      informational.

      ACCESS CONTROL CHECK: For EVERY function in the attack path — read the function
      and its modifiers. If any required function needs a role the attacker doesn't have
      (and the bug is NOT the missing check itself) → implausible.

      OUTPUT: Valid JSON array only. Include ALL investigated narratives.

      [
        {
          "narrative_id": "CAP-01",
          "verdict": "exploitable|implausible|borderline",
          "verdict_reason": "precise explanation with code file:line references",
          "title": "descriptive title",
          "severity_estimate": "high|medium|low|informational",
          "root_cause": "one precise sentence identifying the buggy code",
          "entry_point": "ContractName.sol:functionName():L123",
          "corroborated_by": ["VSCAN-01", "STATE-02"],
          "attack_path": {
            "attacker": "description of attacker role",
            "preconditions": [
              "concrete state condition + how it is reachable"
            ],
            "steps": [
              "1. Deploy attacker contract AttackerContract",
              "2. Call protocol.deposit(1e18) to establish initial position",
              "3. Call AttackerContract.attack() which internally: ...",
              "N. Profit: attacker balance increases by X tokens (~$Y)"
            ],
            "result": "exact impact: attacker gains X ETH, protocol loses Y, users lose Z"
          },
          "code_refs": [
            {"file": "src/Vault.sol", "lines": "123-145", "issue": "state change after external call"}
          ],
          "estimated_profit": "dust|small|medium|large",
          "confidence": "high|medium|low",
          "kill_reason": null
        }
      ]

  # ───────────────────────────────────────────────────────────────────────────
  # STAGE 4 · Adversarial Challenge
  # Try hard to kill every finding. Only findings that survive adversarial
  # scrutiny move to the judge. Uses Opus.
  # ───────────────────────────────────────────────────────────────────────────
  - id: adversarial
    name: "Stage 4 · Adversarial Challenge"
    profile: opus
    tools: ["read", "glob"]
    max_turns: 30
    system_prompt: |
      You are the defense. Your job is to kill false positives. You challenge
      every finding aggressively. You read code to verify your challenges —
      you never assume. You apply the canonical form rule: only reject a finding
      if the CORE vulnerability does not exist. Do not reject because the attack
      description has minor inaccuracies if the underlying bug is real.
    outputs:
      - name: output
        type: text
        save_to: "{{ inputs.repo_path }}/.clido-audit/adversarial.json"
    prompt: |
      Repository: {{ inputs.repo_path }}

      Read the investigation results: {{ inputs.repo_path }}/.clido-audit/investigation.json

      Challenge every finding marked verdict: "exploitable" or "borderline".
      Your goal: find errors that prove the finding is invalid. Only findings
      that survive all your challenges move forward.

      CHALLENGE METHODOLOGY for each finding:

      1. CHALLENGE THE ENTRY POINT
         Read the function and ALL its modifiers.
         - Can an unprivileged actor ACTUALLY call this? Read every require and modifier.
         - Is the function internal/private? Is there a caller restriction you missed?

      2. CHALLENGE THE PRECONDITIONS
         For each precondition:
         - Trace the state transitions required to reach it
         - Does any precondition require admin action or an impossible state?
         - Is any precondition blocked by an invariant enforced elsewhere?

      3. CHALLENGE EACH ATTACK STEP
         Read the actual function called in each step:
         - Does calling it produce the claimed effect?
         - Is there a require/revert/modifier that would block it?
         - Are there slippage limits or sanity checks that bound the profit?

      4. CHALLENGE THE PROFIT MECHANISM
         - Is there a circuit breaker, pause mechanism, or fee that limits impact?
         - Is there a time lock preventing same-block execution?
         - Does the claimed profit actually materialize after fees?

      5. IS THIS A DESIGN CHOICE?
         Read NatSpec, any README or documentation for the relevant functions.
         If the documentation says this is intentional → not a bug.

      6. COUNTERARGUMENT EXCHANGE (for borderline findings)
         For findings marked "borderline": produce the strongest possible argument
         FOR the finding's validity, then the strongest argument AGAINST.
         Then make a final determination based on which is more convincing.

      CANONICAL FORM RULE (critical):
      Challenge findings in their STRONGEST possible formulation.
      If the core vulnerability exists but attack steps have minor errors,
      acknowledge the core and note corrections — do NOT kill the finding
      just because one step needs refinement.
      Only mark survived: false when the CORE vulnerability does not hold.

      Use the `read` tool to verify EVERY challenge claim. Do not assume.

      OUTPUT: Valid JSON array only.

      [
        {
          "narrative_id": "CAP-01",
          "survived": true,
          "confidence": 85,
          "challenges": [
            {
              "challenge_type": "entry_point|precondition|attack_step|profit|design_choice",
              "claim": "The deposit() function has nonReentrant at line 45",
              "code_ref": "src/Vault.sol:L45",
              "decisive": false,
              "rebuttal": "nonReentrant only guards deposit(); the callback re-enters withdraw() at L112 which is unprotected"
            }
          ],
          "canonical_attack": "Strongest, most precise formulation of the attack after removing errors",
          "kill_reason": null
        }
      ]

  # ───────────────────────────────────────────────────────────────────────────
  # STAGE 5 · Judge
  # Final verdict. Reads cited code independently to verify every claim.
  # Assigns severity. Produces clean finding descriptions.
  # ───────────────────────────────────────────────────────────────────────────
  - id: judge
    name: "Stage 5 · Judge"
    profile: opus
    tools: ["read", "glob"]
    max_turns: 30
    system_prompt: |
      You are a senior smart contract security judge. You are conservative and
      precise. You independently verify every code citation before confirming
      a finding. You never inflate severity. You assign "High" only when direct
      fund theft or protocol insolvency is proven.
    outputs:
      - name: output
        type: text
        save_to: "{{ inputs.repo_path }}/.clido-audit/findings.json"
    prompt: |
      Repository: {{ inputs.repo_path }}

      Read the adversarial review results: {{ inputs.repo_path }}/.clido-audit/adversarial.json
      Also read the investigation for full context: {{ inputs.repo_path }}/.clido-audit/investigation.json
      Also read intent gaps: {{ inputs.repo_path }}/.clido-audit/intent_gaps.json

      Review only findings where survived: true. For each, read the cited code
      independently and apply the final validation checklist.

      FINAL VALIDATION CHECKLIST (ALL must pass to confirm):

      [ ] Attacker is completely unprivileged (no admin, oracle, or validator role)
      [ ] Required state is reachable via NORMAL protocol use (not admin action)
      [ ] Attack steps are deterministic and reproducible
      [ ] Real financial damage: theft, permanent insolvency, or unauthorized minting
      [ ] Protocol invariant violated — NOT a documented design choice
      [ ] No missed access control — read EVERY function in the attack path
      [ ] Impact magnitude is meaningful (not dust-level)

      If ANY item fails → confirmed: false with specific explanation.

      SEVERITY RULES (Code4rena calibration):
      High:
        - Direct theft of tokens/ETH from users or protocol treasury
        - Permanent protocol insolvency
        - Unauthorized minting of protocol tokens
        - Scale: large (scales with TVL) or > ~$1,000 per exploit
      Medium:
        - Theft possible only under specific conditions that significantly limit scale
        - Permanent availability impact (not just temporary DoS)
        - Protocol invariant violation with indirect financial consequences
        - Griefing that causes material harm to users (not just dust)
      Low:
        - Dust-level rounding exploitation (exploitable but tiny profit)
        - Requires very unlikely state that may never occur in practice
        - Minor invariant violation with no direct loss path
      Informational:
        - Code quality, best practice violations, no exploit path
        - Documentation gaps surfaced by intent reconstruction

      NEVER use "Critical" — High is the maximum severity.

      NOTE: Intent gaps from intent_gaps.json that were confirmed as real issues
      (not just documentation drift) should be included as findings with appropriate
      severity. Document-only gaps with no exploit path → Informational.

      INDEPENDENT VERIFICATION:
      Use the `read` tool to verify at least the primary code reference for each finding.
      If a finding claims "function X has no access control at line Y" → read line Y and confirm.
      If you find the claim is wrong → mark confirmed: false.

      OUTPUT: Valid JSON array only.

      [
        {
          "id": "F-01",
          "narrative_id": "CAP-01",
          "confirmed": true,
          "severity": "high|medium|low|informational",
          "title": "Flash Loan Share Price Inflation in Vault.deposit()",
          "summary": "1-2 sentences: what the bug is and what an attacker can do",
          "impact": "Precise: 'Attacker can steal up to X% of vault TVL per tx by...'",
          "root_cause": "One sentence with exact code location",
          "attack_path": {
            "attacker": "unprivileged external EOA or contract",
            "preconditions": [],
            "steps": [],
            "result": "attacker gains X, protocol loses Y"
          },
          "code_refs": [
            {
              "file": "src/Vault.sol",
              "lines": "123-145",
              "description": "description of the vulnerable code"
            }
          ],
          "recommendation": "Specific, actionable fix with code guidance",
          "verification_note": "What you read to independently confirm this finding"
        }
      ]

  # ───────────────────────────────────────────────────────────────────────────
  # STAGE 5b · Coverage Gap Analysis + Targeted Investigation (NEW)
  # After judge, identify attack surfaces NOT covered by any narrative.
  # Deliberately investigate the uncovered high-value surfaces.
  # Also: use confirmed findings to generate new hypotheses (attackers-review).
  # ───────────────────────────────────────────────────────────────────────────
  - id: coverage_gap
    name: "Stage 5b · Coverage Gap Analysis"
    profile: opus
    tools: ["read", "glob", "bash"]
    max_turns: 40
    on_error: continue
    system_prompt: |
      You are performing systematic coverage gap analysis. Your goal is to identify
      attack surfaces that WERE NOT covered by any of the imagination or vector scan
      agents. You then deliberately investigate the highest-value uncovered surfaces.
      You also reason about whether confirmed findings suggest related vulnerabilities
      that were not yet investigated (attackers-review loop).
    outputs:
      - name: output
        type: text
        save_to: "{{ inputs.repo_path }}/.clido-audit/gap_findings.json"
    prompt: |
      Repository: {{ inputs.repo_path }}

      Read code intelligence: {{ inputs.repo_path }}/.clido-audit/intel.json
      Read confirmed findings: {{ inputs.repo_path }}/.clido-audit/findings.json
      Read investigation results: {{ inputs.repo_path }}/.clido-audit/investigation.json

      ═══════════════════════════════════════════════════════════════
      PHASE A — COVERAGE MAPPING
      ═══════════════════════════════════════════════════════════════

      Build a coverage map:
      - For each contract.function in intel.json, note whether it appeared as an
        entry_point in ANY narrative (across all investigation results)
      - Identify "uncovered" functions: high-value functions that were never investigated
        as an entry point

      HIGH-VALUE functions to prioritize for coverage:
      - Any function that transfers tokens or ETH
      - Any function in the access_control_map.permissionless_functions list
      - Any function that the intel.json marks as a flash_callback
      - Any function in the "crown_jewels" list from intel.json
      - Any function touched by a developer TODO (from preflight)

      ═══════════════════════════════════════════════════════════════
      PHASE B — DELIBERATE INVESTIGATION OF GAPS
      ═══════════════════════════════════════════════════════════════

      For each uncovered high-value function:
      1. Read the function and its complete call tree
      2. Apply the following gap-specific checklist:
         - Does it move funds? Is CEI followed? Any reentrancy path?
         - Is the caller verified? Can any unprivileged actor call it unexpectedly?
         - Does it modify critical state variables (share price, debt, collateral)?
         - Any arithmetic on user-controlled inputs without bounds?
         - Any external call with a user-controlled target?
      3. If you find a plausible vulnerability, create a finding entry

      ═══════════════════════════════════════════════════════════════
      PHASE C — ATTACKERS-REVIEW LOOP
      ═══════════════════════════════════════════════════════════════

      Read confirmed findings (findings.json). For each finding with severity high or medium:

      Ask: "What OTHER vulnerabilities does this finding suggest I haven't investigated?"

      Examples of attacker-review reasoning:
      - "We found a reentrancy in withdraw(). Are there OTHER state-changing functions
        that call the same external hook without a reentrancy guard?"
      - "We found a missing nonce in permit(). Are there other signed message types
        in this codebase that may also lack nonces?"
      - "We found a flash loan attack via deposit(). Can the same flash loan pattern
        be applied to withdraw() or redeem()?"
      - "We found storage collision in proxy slot X. Are there other slots that may
        collide after a future upgrade?"

      Investigate each new hypothesis by reading the code.

      OUTPUT: Valid JSON only.

      {
        "coverage_map": {
          "total_functions_in_scope": 0,
          "covered_as_entry_point": 0,
          "uncovered": [
            {"contract": "", "function": "", "reason_high_value": ""}
          ]
        },
        "gap_findings": [
          {
            "id": "GAP-F-01",
            "source": "coverage_gap|attackers_review",
            "parent_finding": "F-01 (for attackers_review) or null",
            "title": "concise title",
            "severity": "high|medium|low|informational",
            "confirmed": true,
            "entry_point": "Contract.sol:function():L123",
            "summary": "1-2 sentences",
            "root_cause": "one precise sentence",
            "attack_path": {
              "attacker": "unprivileged EOA",
              "preconditions": [],
              "steps": [],
              "result": ""
            },
            "code_refs": [{"file": "", "lines": "", "description": ""}],
            "recommendation": ""
          }
        ],
        "attackers_review_hypotheses": [
          {
            "triggered_by": "F-01",
            "hypothesis": "description of the new attack direction",
            "investigated": true,
            "result": "found|not_found|inconclusive",
            "finding_id": "GAP-F-01 or null"
          }
        ]
      }

  # ───────────────────────────────────────────────────────────────────────────
  # STAGE 6 · Proof of Concept Chain
  # Multi-agent retry chain per finding: sonnet (3x) → haiku (3x) → opus (1x)
  # Each finding gets multiple attempts before moving to next.
  # ───────────────────────────────────────────────────────────────────────────

  # Phase 6a: Scaffold generation (creates base test structure)
  - id: poc_scaffold
    name: "Stage 6a · PoC Scaffold"
    profile: sonnet
    tools: ["read", "glob", "bash", "write"]
    max_turns: 30
    on_error: continue
    system_prompt: |
      You are a Solidity test scaffold generator. You create the base test file structure
      for each finding. You do NOT write the full exploit - just the scaffolding:
      imports, setUp(), helper contracts, and empty test functions.
      This scaffold will be used by subsequent agents to write the actual exploit.
    outputs:
      - name: output
        type: text
        save_to: "{{ inputs.repo_path }}/.clido-audit/poc-scaffolds.json"
    prompt: |
      Repository: {{ inputs.repo_path }}

      Read confirmed findings: {{ inputs.repo_path }}/.clido-audit/findings.json
      Read gap findings: {{ inputs.repo_path }}/.clido-audit/gap_findings.json

      For each confirmed finding (confirmed: true), create a scaffold test file.

      SCAFFOLD STRUCTURE (save to test/audit/Audit_<FindingId>.t.sol):
      ```solidity
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.x;

      import "forge-std/Test.sol";
      import "forge-std/console.sol";
      // TODO: Add target contract imports based on finding.entry_point

      contract Audit_<FindingId>_PoC is Test {
          // TODO: Protocol contracts (to be filled by exploit writer)
          // TODO: Attacker contract (if needed)

          address alice = makeAddr("alice");
          address bob = makeAddr("bob");

          function setUp() public {
              // TODO: Deploy protocol, fund accounts
          }

          function test_exploit_<findingId>() public {
              // TODO: Implement exploit (to be written by subsequent agent)
          }
      }
      ```

      For each finding, output:
      - finding_id
      - scaffold_file path
      - target_contracts to import
      - entry_point function

      OUTPUT: JSON array of scaffold entries.

  # Phase 6b: PoC Write - Attempt 1 (Sonnet, 3 retries)
  - id: poc_write_1
    name: "Stage 6b · PoC Write (Sonnet)"
    profile: sonnet
    tools: ["read", "glob", "bash", "write", "edit"]
    max_turns: 50
    on_error: retry
    retry:
      max_attempts: 3
      backoff: linear
    system_prompt: |
      You are a Solidity exploit developer. You write proof-of-concept tests that prove
      findings are exploitable. You read the scaffold, implement the exploit in the
      test function, run forge test, and iterate until it passes.
      CRITICAL: If test fails, read the error, fix the code, and retry. Do NOT give up.
    outputs:
      - name: output
        type: text
        save_to: "{{ inputs.repo_path }}/.clido-audit/poc-attempt-1.json"
    prompt: |
      Repository: {{ inputs.repo_path }}
      {% if inputs.rpc_url != "" %}RPC URL: {{ inputs.rpc_url }}{% endif %}

      Read findings: {{ inputs.repo_path }}/.clido-audit/findings.json
      Read gap_findings: {{ inputs.repo_path }}/.clido-audit/gap_findings.json
      Read scaffolds: {{ inputs.repo_path }}/.clido-audit/poc-scaffolds.json

      MISSION: For each confirmed finding, write a COMPLETE working PoC test.

      PROCESS PER FINDING:
      1. Read the scaffold file (test/audit/Audit_<FindingId>.t.sol)
      2. Read the target contract source code
      3. Implement the full exploit in test_exploit_<findingId>():
         - Complete the setUp() function
         - Write all attack steps based on finding.attack_path
         - Add proper assertions that prove the exploit
      4. Run: forge test --match-path "test/audit/Audit_<FindingId>.t.sol" -vvv
      5. IF TEST FAILS:
         - Read the error output carefully
         - Fix the issue (imports, syntax, logic, assertions)
         - Re-run the test
         - Repeat up to 3 times per finding
      6. IF TEST PASSES: Mark as "passed"

      SUCCESS CRITERIA (must report for each finding):
      - poc_written: true if file exists
      - compiled: true if forge build succeeds
      - test_passed: true if forge test passes
      - attempts: number of iterations needed (1-3)

      OUTPUT: JSON array with one entry per finding:
      [
        {
          "finding_id": "F-01",
          "attempt": 1,
          "agent": "sonnet",
          "poc_written": true,
          "compiled": true,
          "test_passed": true|false,
          "attempts_needed": 1,
          "error": "error message if failed"
        }
      ]

  # Phase 6c: PoC Write - Attempt 2 (Haiku, 3 retries) - for failed PoCs from attempt 1
  - id: poc_write_2
    name: "Stage 6c · PoC Write (Haiku Retry)"
    profile: haiku
    tools: ["read", "glob", "bash", "write", "edit"]
    max_turns: 50
    on_error: retry
    retry:
      max_attempts: 3
      backoff: linear
    system_prompt: |
      You are a Solidity exploit developer. Previous agents failed to create working PoCs.
      Your job is to retry the FAILED findings with a fresh approach. Read the previous
      errors, fix the issues, and make the tests pass. Do NOT skip any finding.
    outputs:
      - name: output
        type: text
        save_to: "{{ inputs.repo_path }}/.clido-audit/poc-attempt-2.json"
    prompt: |
      Repository: {{ inputs.repo_path }}
      {% if inputs.rpc_url != "" %}RPC URL: {{ inputs.rpc_url }}{% endif %}

      Read previous attempt results: {{ inputs.repo_path }}/.clido-audit/poc-attempt-1.json
      Read findings: {{ inputs.repo_path }}/.clido-audit/findings.json
      Read gap_findings: {{ inputs.repo_path }}/.clido-audit/gap_findings.json

      MISSION: Retry ONLY the findings that FAILED in attempt 1.

      For each finding where test_passed: false (or not present):
      1. Read the previous error message
      2. Read the existing (broken) test file if it exists
      3. Either fix it OR rewrite from scratch
      4. Run forge test until it passes or you've tried 3 times

      OUTPUT: JSON array with results for ALL findings (passed ones copy from attempt 1):
      [
        {
          "finding_id": "F-01",
          "attempt": 2,
          "agent": "haiku",
          "poc_written": true,
          "compiled": true,
          "test_passed": true|false,
          "attempts_needed": 1,
          "cumulative_attempts": 2,
          "error": "error if still failing"
        }
      ]

  # Phase 6d: PoC Write - Attempt 3 (Opus escalation, 1 retry) - final attempt for critical findings
  - id: poc_write_3
    name: "Stage 6d · PoC Write (Opus Escalation)"
    profile: opus
    tools: ["read", "glob", "bash", "write", "edit"]
    max_turns: 60
    on_error: retry
    retry:
      max_attempts: 2
      backoff: linear
    system_prompt: |
      You are a senior Solidity security expert. This is the FINAL escalation attempt.
      Previous agents (sonnet, haiku) failed to create working PoCs. Use your superior
      reasoning to diagnose why they failed and create working exploits.
      Focus on High and Medium severity findings first.
    outputs:
      - name: output
        type: text
        save_to: "{{ inputs.repo_path }}/.clido-audit/poc-attempt-3.json"
    prompt: |
      Repository: {{ inputs.repo_path }}
      {% if inputs.rpc_url != "" %}RPC URL: {{ inputs.rpc_url }}{% endif %}

      Read attempt 1: {{ inputs.repo_path }}/.clido-audit/poc-attempt-1.json
      Read attempt 2: {{ inputs.repo_path }}/.clido-audit/poc-attempt-2.json
      Read findings: {{ inputs.repo_path }}/.clido-audit/findings.json
      Read gap_findings: {{ inputs.repo_path }}/.clido-audit/gap_findings.json

      MISSION: Final escalation attempt for findings that still fail.

      PRIORITY ORDER (focus on these first):
      1. High severity findings with test_passed: false
      2. Medium severity findings with test_passed: false
      3. Low severity findings (if time permits)

      For each failing finding:
      1. Analyze WHY previous agents failed (read their errors)
      2. Read the target contract carefully
      3. Write a CORRECT exploit from first principles
      4. Iterate until test passes (up to 2 attempts)

      OUTPUT: JSON array with final results:
      [
        {
          "finding_id": "F-01",
          "attempt": 3,
          "agent": "opus",
          "poc_written": true,
          "compiled": true,
          "test_passed": true|false,
          "final_status": "passed|failed",
          "cumulative_attempts": 4,
          "notes": "why it was hard or how it was fixed"
        }
      ]

  # Phase 6e: Final PoC Results Aggregation
  - id: poc_aggregate
    name: "Stage 6e · PoC Results Aggregation"
    profile: sonnet
    tools: ["read"]
    max_turns: 20
    on_error: continue
    system_prompt: |
      You aggregate PoC results from multiple attempts into a final summary.
      You read all attempt JSON files and produce the final poc-results.json.
    outputs:
      - name: output
        type: text
        save_to: "{{ inputs.repo_path }}/.clido-audit/poc-results.json"
    prompt: |
      Read and aggregate:
      - Attempt 1: {{ inputs.repo_path }}/.clido-audit/poc-attempt-1.json
      - Attempt 2: {{ inputs.repo_path }}/.clido-audit/poc-attempt-2.json
      - Attempt 3: {{ inputs.repo_path }}/.clido-audit/poc-attempt-3.json
      - Findings: {{ inputs.repo_path }}/.clido-audit/findings.json

      Create FINAL aggregated results:
      - For each finding, take the BEST result across all attempts
      - If any attempt has test_passed: true, the finding is "pass"
      - Report cumulative attempts across the chain

      OUTPUT: Final poc-results.json array:
      [
        {
          "finding_id": "F-01",
          "narrative_id": "CAP-01",
          "title": "finding title",
          "poc_file": "test/audit/Audit_F01.t.sol",
          "poc_written": true,
          "forge_available": true,
          "test_result": "pass|fail_compile|fail_assertion",
          "attempts": 2,
          "agents_used": ["sonnet", "haiku"],
          "notes": "Passed on haiku retry after sonnet failed with import error"
        }
      ]

  # ───────────────────────────────────────────────────────────────────────────
  # STAGE 7 · Report
  # Format confirmed findings + PoC results into a professional audit report.
  # Includes coverage map, gap analysis, and rejected findings for completeness.
  # ───────────────────────────────────────────────────────────────────────────
  - id: report
    name: "Stage 7 · Audit Report"
    tools: ["read"]
    max_turns: 10
    system_prompt: |
      You are a technical writer producing professional smart contract security audit
      reports. You are precise and direct. No filler. No hedging. If findings are
      serious, say so clearly.
    outputs:
      - name: output
        type: text
        save_to: "{{ inputs.repo_path }}/.clido-audit/report.md"
    prompt: |
      Read all audit artifacts:
      - Confirmed findings: {{ inputs.repo_path }}/.clido-audit/findings.json
      - Gap findings: {{ inputs.repo_path }}/.clido-audit/gap_findings.json
      - PoC results: {{ inputs.repo_path }}/.clido-audit/poc-results.json
      - Code intel for protocol context: {{ inputs.repo_path }}/.clido-audit/intel.json
      - Preflight context: {{ inputs.repo_path }}/.clido-audit/preflight.json
      - Intent gaps: {{ inputs.repo_path }}/.clido-audit/intent_gaps.json
      - Investigation results: {{ inputs.repo_path }}/.clido-audit/investigation.json
      - Coverage gap analysis: {{ inputs.repo_path }}/.clido-audit/gap_findings.json

      Produce a complete Markdown audit report. Structure:

      ---

      # Smart Contract Security Audit

      **Repository**: `{{ inputs.repo_path }}`
      **Date**: {{ date }}
      **Methodology**: Preflight → Code intelligence → Intent reconstruction → 10 parallel
      attack angles → Systematic vector scan → Deep investigation → Adversarial challenge →
      Independent judge → Coverage gap analysis → Proof-of-concept testing

      ---

      ## Executive Summary

      [2-3 paragraphs. Overview of the protocol, its type, and what was analyzed.
      Total finding count by severity (include gap findings). Overall security assessment.
      Be direct — if there are serious issues, say so clearly without corporate hedging.
      Note any prior audit findings that were unresolved.]

      ## Finding Summary

      | ID | Title | Severity | Source | PoC |
      |----|-------|----------|--------|-----|
      | F-01 | Flash Loan Share Price Inflation | High | Imagination | ✓ Pass |
      | GAP-F-01 | Uncovered reentrancy in redeem() | High | Gap Analysis | ✓ Pass |

      ---

      ## Findings

      For each confirmed finding from BOTH findings.json and gap_findings.json
      (combined, ordered by severity: High → Medium → Low → Informational):

      ---

      ### [F-XX] Title

      **Severity**: High / Medium / Low / Informational
      **Source**: Imagination angle / Vector scan / Coverage gap / Attackers review
      **PoC Status**: Pass / Fail / Not run

      **Root Cause**
      One sentence with exact code location.

      **Impact**
      Precise description of what an attacker can do and at what scale.

      **Attack Scenario**

      **Attacker**: description

      **Preconditions**:
      - condition 1

      **Steps**:
      1. ...
      2. ...
      N. Result: attacker gains X, protocol loses Y

      **Proof of Concept**

      ```
      [Include the test function signature and key assertion lines if PoC passed.
       If PoC failed, note the status.]
      ```

      **Code References**
      - `src/File.sol:L123-L145` — description of the vulnerable code

      **Recommendation**
      Specific, actionable fix. Include code if helpful.

      ---

      ## Intent Reconstruction Findings

      [List any significant gaps between developer-stated invariants and code reality,
      even if they don't rise to a full finding severity. These help developers understand
      where documentation diverges from implementation.]

      ---

      ## Rejected Findings

      [Brief table of narratives that were investigated and rejected, with one-sentence
      reason. This demonstrates thoroughness.]

      | Angle | Description | Rejection Reason |
      |-------|-------------|-----------------|

      ---

      ## Coverage Analysis

      [Summary of attack surfaces investigated. How many functions were covered as
      entry points vs total in-scope functions. What attack angles were applied.
      Any areas that could not be fully analyzed.]

      ---

      ## Prior Audit Context

      [If prior audits were found in preflight: list them, their dates, and note
      whether previously acknowledged-but-unfixed issues were still present.]

      ---

      *All findings independently verified against source code. PoC tests written
      in Foundry where applicable. Human expert review recommended before production
      deployment.*

      ---

      Output the complete Markdown report. No text before or after.

output:
  print_summary: true
