name: solidity-audit
version: "2"
description: "Bulletproof multi-phase Solidity security audit: preflight → code intelligence → intent reconstruction → 10 parallel imagination angles → systematic vector scan → deep investigation → adversarial challenge → judge → coverage gap analysis → PoC chain → report"

inputs:
  - name: repo_path
    description: "Path to the Solidity repository to audit (defaults to current directory)"
    required: false
    default: "{{ cwd }}"
  - name: scope
    description: "Optional: comma-separated list of files or directories in scope"
    required: false
    default: ""
  - name: context
    description: "Optional: free-text protocol description (e.g. 'Lending protocol with variable interest rates')"
    required: false
    default: ""
  - name: rpc_url
    description: "Optional: RPC URL for PoC fork tests (e.g. https://eth-mainnet.alchemyapi.io/v2/...)"
    required: false
    default: ""

# All intermediate outputs are saved to <repo_path>/.clido-audit/ so that
# subsequent steps can read them via tool rather than embedding large blobs in prompts.

steps:

  # ───────────────────────────────────────────────────────────────────────────
  # STAGE 0 · Preflight
  # Git analysis, prior audit extraction, build verification.
  # Establishes critical context before any security analysis begins.
  # ───────────────────────────────────────────────────────────────────────────
  - id: preflight
    name: "Stage 0 · Preflight & Context"
    tools: ["read", "glob", "bash"]
    max_turns: 20
    on_error: continue
    system_prompt: |
      You are a senior smart contract security researcher performing pre-audit
      reconnaissance. You gather context about the codebase's history, known issues,
      and prior review work. You are factual and report exactly what you find.
    outputs:
      - name: output
        type: text
        save_to: "{{ inputs.repo_path }}/.clido-audit/preflight.json"
    prompt: |
      Repository: {{ inputs.repo_path }}
      {% if inputs.context != "" %}Protocol context: {{ inputs.context }}{% endif %}

      Perform pre-audit reconnaissance. Run each section and collect findings.

      SECTION 1 — GIT HISTORY ANALYSIS
      Run: cd {{ inputs.repo_path }} && git log --oneline -30 2>/dev/null || echo "not_a_git_repo"
      Run: cd {{ inputs.repo_path }} && git log --oneline --since="90 days ago" --format="%h %s" 2>/dev/null | head -50

      Look for:
      - Recent commits with keywords: fix, bug, patch, security, revert, hotfix, vulnerability
        → these are high-priority review targets
      - Large-scale refactors in the last 90 days → regression risk
      - Files changed most frequently (git log --follow --name-only)

      SECTION 2 — PRIOR AUDIT EXTRACTION
      Search for any existing audit reports:
      - Glob: audits/, audit/, security/, reports/, docs/audits/
      - Glob: **/*.pdf, **/*audit*.md, **/*security*.md, **/*review*.md
      - Read any found files and extract: auditor name, date, findings summary,
        anything described as "acknowledged but not fixed" or "out of scope"

      SECTION 3 — KNOWN ISSUES / TODO EXTRACTION
      Run: cd {{ inputs.repo_path }} && grep -rn "TODO\|FIXME\|HACK\|XXX\|BUG\|NOTE:.*unsafe\|NOTE:.*risk\|NOTE:.*TODO" --include="*.sol" 2>/dev/null | head -100
      These are developer-acknowledged issues — they deserve heightened scrutiny.

      SECTION 4 — BUILD & DEPENDENCY CHECK
      Run: cd {{ inputs.repo_path }} && forge build 2>&1 | tail -20 (if foundry.toml exists)
      Run: cd {{ inputs.repo_path }} && cat foundry.toml 2>/dev/null || cat hardhat.config.ts 2>/dev/null || cat hardhat.config.js 2>/dev/null
      Note: compiler version(s), optimizer runs, via-ir setting, any compiler warnings.

      SECTION 5 — DEPENDENCY AUDIT
      Look for: package.json, lib/ (Foundry), node_modules/
      Identify: OpenZeppelin version, Solmate version, any fork-modified libraries.
      Flag: is Solmate's SafeTransferLib used? (It does NOT check contract existence.)
      Flag: any git submodule pointing to an unofficial fork?

      SECTION 6 — SCOPE DETERMINATION
      {% if inputs.scope != "" %}
      User-provided scope: {{ inputs.scope }}
      {% else %}
      Count all .sol files. List top-level contracts (non-test, non-mock, non-interface).
      {% endif %}

      OUTPUT: Valid JSON only.

      {
        "git_history": {
          "recent_suspicious_commits": [
            {"hash": "", "message": "", "risk": "why this is a target"}
          ],
          "high_churn_files": [],
          "days_of_history": 0
        },
        "prior_audits": [
          {
            "source": "filename or URL",
            "auditor": "",
            "date": "",
            "finding_count": 0,
            "unresolved_issues": ["issue description"],
            "out_of_scope_items": []
          }
        ],
        "developer_todos": [
          {"file": "", "line": 0, "text": "", "risk": "why it matters"}
        ],
        "build": {
          "framework": "foundry|hardhat|none",
          "compiler_version": "",
          "optimizer": {"enabled": false, "runs": 0},
          "via_ir": false,
          "warnings": [],
          "build_status": "clean|warnings|errors|unknown"
        },
        "dependencies": {
          "openzeppelin_version": "",
          "solmate_used": false,
          "solmate_safetransferlib_used": false,
          "unofficial_forks": [],
          "notable_flags": []
        },
        "scope": {
          "in_scope_files": [],
          "total_sol_files": 0,
          "excluded_files": []
        }
      }

  # ───────────────────────────────────────────────────────────────────────────
  # STAGE 1 · Code Intelligence
  # Read every Solidity file; produce a compact structured JSON map of the
  # protocol. Saved to disk so imagination agents can read it directly.
  # ───────────────────────────────────────────────────────────────────────────
  - id: code_intel
    name: "Stage 1 · Code Intelligence"
    tools: ["read", "glob", "bash"]
    max_turns: 40
    system_prompt: |
      You are a senior smart contract security researcher. You explore codebases
      systematically and produce accurate, structured output. You NEVER hallucinate
      code you have not read. When uncertain, read the file.
    outputs:
      - name: output
        type: text
        save_to: "{{ inputs.repo_path }}/.clido-audit/intel.json"
    prompt: |
      You are a senior smart contract security researcher. Deeply explore a Solidity
      repository and produce a structured code intelligence report.

      REPOSITORY: {{ inputs.repo_path }}
      {% if inputs.scope != "" %}SCOPE (analyze only these paths): {{ inputs.scope }}{% endif %}
      {% if inputs.context != "" %}PROTOCOL CONTEXT: {{ inputs.context }}{% endif %}

      First, read the preflight report for context: {{ inputs.repo_path }}/.clido-audit/preflight.json

      TASK:

      1. Find all Solidity source files. Skip test files (*.t.sol, *Test*.sol),
         mocks (*Mock*.sol), and pure interface files (prefixed I or named Interface*).
         If scope is specified, limit to those paths.

      2. For each contract read the full source and extract:
         - Name, type (ERC20/ERC721/ERC4626/vault/lending/DEX/bridge/etc.)
         - State variables: name, type, visibility, purpose
         - Functions: name, visibility, modifiers, access requirements (permissionless / owner / role:X),
           what state they read and write, external calls made
         - Events and custom errors
         - unchecked blocks (list line ranges)
         - assembly blocks (yes/no + purpose)
         - delegatecall usage (yes/no + target)
         - Any low-level .call/.staticcall/.delegatecall
         - transient storage (tstore/tload) usage

      3. Identify:
         - Protocol type: lending | DEX | staking | bridge | vault | governance |
           yield-aggregator | perpetuals | options | NFT | other
         - Economic model: how value enters and exits the protocol
         - Key invariants: what must always be true (e.g. "sum of user balances == totalSupply")
         - Trust assumptions: which external systems the protocol trusts without verification
           (oracles, bridges, admin keys, governance multisig)
         - Upgrade mechanism: proxy type (UUPS/Transparent/Diamond/Beacon), initializer pattern,
           storage layout, implementation contract address
         - External token handling: which ERC standards, fee-on-transfer support, rebasing tokens,
           non-standard return values

      4. Build access control map:
         - Permissionless functions (callable by any EOA)
         - Admin/owner functions
         - Role-gated functions (list role name)
         - Timelocked functions (list delay)

      5. Flag high-risk patterns (read the actual code to confirm):
         - Spot price oracle reads (pool.slot0(), reserve-based price, single-block TWAP)
         - State changes after external calls (potential reentrancy)
         - unchecked arithmetic on user-controlled values
         - Share/price calculations susceptible to inflation attacks
         - Signature verification (EIP-712, EIP-2098, ecrecover, permit)
         - Storage slot collisions (proxy upgradeability)
         - Flash loan callbacks (onFlashLoan, executeOperation, uniswapV3FlashCallback, etc.)
         - Chainlink oracle calls (latestRoundData — check if staleness and circuit breaker are verified)
         - Cross-chain messaging (LayerZero, Axelar, Wormhole, Hyperlane receives)
         - ERC2771 trusted forwarder patterns (msg.sender extraction from calldata)
         - Diamond proxy facets (selector clash risk)
         - Permit() calls on behalf of users (frontrun risk)

      6. Identify the "crown jewels" — the 3-5 most valuable state transitions or
         assets that an attacker would want to compromise. These should receive the
         deepest scrutiny in later stages.

      OUTPUT: Valid JSON only. No text before or after.

      {
        "protocol_type": "string",
        "compiler_versions": [],
        "economic_model": "2-3 sentence description",
        "crown_jewels": [
          {"description": "", "contract": "", "function_or_var": "", "why_valuable": ""}
        ],
        "contracts": [
          {
            "name": "ContractName",
            "file": "src/path/File.sol",
            "type": "...",
            "inherits": [],
            "upgradeable": false,
            "proxy_type": null,
            "state_vars": [
              {"name": "", "type": "", "visibility": "public|private|internal", "notes": ""}
            ],
            "functions": [
              {
                "name": "",
                "visibility": "public|external|internal|private",
                "access": "permissionless|owner|role:X|internal",
                "modifiers": [],
                "reads_state": [],
                "writes_state": [],
                "external_calls": [{"target": "", "selector": ""}],
                "flash_callback": false,
                "uses_permit": false,
                "uses_signature": false,
                "notes": ""
              }
            ],
            "unchecked_blocks": ["L123-L145"],
            "assembly_blocks": [],
            "delegatecall": false,
            "transient_storage": false,
            "low_level_calls": []
          }
        ],
        "value_flows": [
          {"from": "", "to": "", "trigger": "functionName()", "token": "ETH|ERC20|shares"}
        ],
        "external_dependencies": [
          {
            "name": "",
            "type": "oracle|amm|bridge|token|lending|forwarder",
            "trust_level": "trusted|semi-trusted|untrusted",
            "notes": ""
          }
        ],
        "access_control_map": {
          "permissionless_functions": ["Contract.fn()"],
          "admin_functions": ["Contract.fn()"],
          "timelocked_functions": [{"fn": "", "delay_seconds": 0}],
          "roles": [{"name": "", "controls": []}]
        },
        "key_invariants": [
          {"description": "", "enforced_by": "code|documentation|assumed"}
        ],
        "high_risk_patterns": [
          {"pattern": "", "location": "File.sol:functionName():L123", "notes": ""}
        ],
        "math_risks": [
          {"location": "", "operation": "", "risk": "overflow|underflow|precision|division_before_mul|downcast|dirty_bits"}
        ],
        "oracle_calls": [
          {"location": "", "oracle_type": "chainlink|uniswap_v3_twap|spot|custom", "staleness_check": false, "circuit_breaker_check": false}
        ],
        "signature_patterns": [
          {"location": "", "type": "eip712|permit|ecrecover|eip2098", "nonce_check": false, "domain_separator": ""}
        ],
        "cross_chain": [
          {"location": "", "protocol": "layerzero|axelar|wormhole|hyperlane|other", "direction": "send|receive", "trust_model": ""}
        ],
        "upgrade_risks": [],
        "test_framework": "foundry|hardhat|none"
      }

  # ───────────────────────────────────────────────────────────────────────────
  # STAGE 1b · Intent Reconstruction & Gap Analysis (CRITICAL — Faultline method)
  # Read ONLY documentation, NatSpec, and comments. NOT code logic.
  # Extract what the developer CLAIMS the protocol does.
  # Then compare those claims against what the code actually does (from intel.json).
  # The delta = potential bugs.
  # ───────────────────────────────────────────────────────────────────────────
  - id: intent_reconstruction
    name: "Stage 1b · Intent Reconstruction & Gap Analysis"
    profile: opus
    tools: ["read", "glob", "bash"]
    max_turns: 30
    system_prompt: |
      You are performing intent reconstruction: extracting what developers CLAIMED
      the protocol should do, then comparing against code reality.

      CRITICAL RULE: In the INTENT EXTRACTION phase, you read ONLY documentation,
      NatSpec comments, README files, and inline comments. You do NOT read
      implementation code logic. You are extracting developer intent from their words.

      In the GAP ANALYSIS phase, you compare the extracted intent against the
      code intelligence report (intel.json) which was derived from actual code.
      Any discrepancy between claimed invariants and code behavior is a red flag.
    outputs:
      - name: output
        type: text
        save_to: "{{ inputs.repo_path }}/.clido-audit/intent_gaps.json"
    prompt: |
      Repository: {{ inputs.repo_path }}

      Read code intelligence for context: {{ inputs.repo_path }}/.clido-audit/intel.json

      ═══════════════════════════════════════════════════════════════
      PHASE A — INTENT EXTRACTION (read docs/NatSpec/comments ONLY)
      ═══════════════════════════════════════════════════════════════

      Read the following documentation sources. DO NOT read implementation logic yet.

      1. README files: README.md, docs/**/*.md, SPECIFICATION.md, ARCHITECTURE.md,
         WHITEPAPER.md, documentation/**

      2. NatSpec: For each in-scope Solidity file, read ONLY the NatSpec comments
         (@notice, @dev, @param, @return, contract-level @notice/@dev).
         Extract every claim: "this function will...", "this invariant holds...",
         "X is always greater than Y", "admin cannot...", "users are guaranteed..."

      3. Inline comments: Read inline comments (// and /* */) that describe
         invariants, assumptions, or expected behavior. Skip TODO/FIXME (already
         collected in preflight).

      For each documented invariant or claim, record:
      - The exact quoted text
      - Where it appears (file:line)
      - What specific behavior it claims

      ═══════════════════════════════════════════════════════════════
      PHASE B — GAP ANALYSIS (compare intent vs intel.json reality)
      ═══════════════════════════════════════════════════════════════

      Now compare each documented claim against what intel.json reveals about
      the actual code structure. Ask for each claim:

      1. UNCHECKED INVARIANT: The docs say "X always holds" — does the code have
         any mechanism enforcing this? Or is it just assumed?
         Example: "totalSupply == sum of balances" claimed but no actual check exists.

      2. MISSING GUARD: The docs say "only owner can do X" — does the code have
         an access modifier on X? If not: access control bug.

      3. BEHAVIORAL MISMATCH: The docs say "deposit returns shares proportional to
         assets" — does the share calculation in intel.json match this claim?

      4. UNDOCUMENTED TRUST: The code trusts external system Y (from intel.json)
         but no documentation mentions this trust assumption — undocumented risk.

      5. SILENT FAILURE: The docs say "reverts if X" — but the code may silently
         continue. Read the specific function to verify (this is the one time you
         may read implementation code — only for gap verification).

      6. DOCUMENTATION LIE: The docs claim the contract is "immutable" or
         "trustless" but intel.json shows admin functions, upgrade mechanisms,
         or oracle dependencies.

      OUTPUT: Valid JSON only.

      {
        "documented_invariants": [
          {
            "id": "INV-01",
            "claim": "exact quoted text",
            "source": "file:line",
            "category": "invariant|access_control|economic|trust|behavioral"
          }
        ],
        "intent_gaps": [
          {
            "id": "GAP-01",
            "invariant_id": "INV-01",
            "gap_type": "unchecked_invariant|missing_guard|behavioral_mismatch|undocumented_trust|silent_failure|documentation_lie",
            "description": "precise description of the discrepancy",
            "claim": "what the docs say",
            "reality": "what intel.json or code shows",
            "risk_level": "high|medium|low",
            "code_ref": "file:line to verify"
          }
        ],
        "undocumented_behaviors": [
          {
            "description": "behavior present in code not mentioned in docs",
            "location": "file:function",
            "risk": "why this matters"
          }
        ]
      }

  # ───────────────────────────────────────────────────────────────────────────
  # STAGE 2 · Imagination (10 parallel attack angles)
  # Each agent reads intel.json + intent_gaps.json from disk, plus actual code.
  # All run in parallel. Three new angles added vs v1: cross-chain, signatures,
  # and upgrades/proxies/assembly.
  # ───────────────────────────────────────────────────────────────────────────

  - id: imagine_capital
    name: "Stage 2a · Flash Loan & Capital Attacks"
    parallel: true
    tools: ["read", "glob"]
    max_turns: 20
    on_error: continue
    system_prompt: |
      You are an adversarial exploit developer. You think like an attacker trying
      to make money. You only report attacks that would actually work and produce
      meaningful profit. You always read the code before claiming something is vulnerable.
    outputs:
      - name: output
        type: text
        save_to: "{{ inputs.repo_path }}/.clido-audit/narratives/imagine_capital.json"
    prompt: |
      Read the code intelligence report: {{ inputs.repo_path }}/.clido-audit/intel.json
      Read intent gaps for additional leads: {{ inputs.repo_path }}/.clido-audit/intent_gaps.json
      Repository: {{ inputs.repo_path }}
      {% if inputs.context != "" %}Protocol context: {{ inputs.context }}{% endif %}

      ATTACKER MODEL (violating these voids your narratives):
      - Completely unprivileged external EOA — no admin keys, no oracle rights, no validator control
      - You CAN take flash loans (Aave V3, Balancer, Uniswap V3), deploy contracts, call any
        public/external function that does not require a privileged role

      A REAL FINDING requires ALL of:
      - You steal tokens/ETH, cause permanent insolvency, or mint tokens without authorization
      - Profit meaningfully exceeds gas cost (not dust-level)
      - Attack executable in one transaction or a deterministic reproducible sequence
      - Vulnerable state reachable through NORMAL protocol use (no admin setup required)

      NOT A FINDING: dust rounding (<0.01% pool), "theoretically possible" without mechanism,
      oracle price control (out of scope), attacks needing admin action as precondition.

      YOUR TASK — generate TRANSIENT CAPITAL attack narratives. Focus on:
      1. Flash loan price oracle manipulation: borrow → move AMM spot price → trigger protocol
         action at wrong price → profit before price reverts
      2. Flash loan collateral inflation: inflate collateral value → over-borrow → repay flash
         loan → keep profit
      3. Donation/inflation attack: donate tokens to vault → inflate totalAssets → steal from
         next depositor via inflated share price
      4. First-depositor attack: be the first depositor and set an exploitable exchange rate
         (especially if virtual shares/assets mechanism is absent)
      5. Share/price manipulation: manipulate totalAssets or totalShares via flash loan
      6. ERC4626 rounding direction: does rounding consistently favor attacker over depositors?
         Can this be exploited profitably over many operations?
      7. JIT liquidity attacks: add liquidity just before a fee-generating event, remove after
      8. Same-block leverage loops exceeding intended limits
      9. Reward accumulator timing: stake → collect rewards that accrued before your stake;
         any timestamp-based accrual that can be gamed in same block

      Also check: any intent gaps from intent_gaps.json related to economic invariants?

      Read the relevant code for each narrative before including it. Verify the entry point
      is actually callable by an unprivileged actor.

      OUTPUT: Valid JSON array only. Empty array [] if nothing plausible found.

      [
        {
          "id": "CAP-01",
          "title": "concise attack title",
          "angle": "transient_capital",
          "entry_point": "ContractName.sol:functionName():L123",
          "attacker": "unprivileged external EOA",
          "preconditions": ["concrete state condition"],
          "preconditions_reachable": "how normal protocol use creates this state",
          "steps": [
            "1. Deploy attacker contract",
            "2. Call flashLoan(token, amount) — this triggers onFlashLoan callback",
            "3. Inside callback: call protocol.deposit(amount) — inflates sharePrice from X to Y",
            "4. ...",
            "N. Profit: ~$X from Y tokens, protocol loses Z"
          ],
          "root_cause": "one precise sentence",
          "estimated_profit": "dust|small(<$1k)|medium($1k-$100k)|large(>$100k)",
          "confidence": "high|medium|low",
          "intent_gap_ref": "GAP-XX if triggered by an intent gap"
        }
      ]

  - id: imagine_ordering
    name: "Stage 2b · MEV & Ordering Attacks"
    parallel: true
    tools: ["read", "glob"]
    max_turns: 20
    on_error: continue
    system_prompt: |
      You are an adversarial exploit developer specializing in MEV and transaction
      ordering. You think like a searcher bot operator. You read code before claiming
      something is exploitable.
    outputs:
      - name: output
        type: text
        save_to: "{{ inputs.repo_path }}/.clido-audit/narratives/imagine_ordering.json"
    prompt: |
      Read the code intelligence report: {{ inputs.repo_path }}/.clido-audit/intel.json
      Read intent gaps: {{ inputs.repo_path }}/.clido-audit/intent_gaps.json
      Repository: {{ inputs.repo_path }}
      {% if inputs.context != "" %}Protocol context: {{ inputs.context }}{% endif %}

      ATTACKER MODEL:
      - Unprivileged EOA or MEV bot — NO admin keys, oracle rights, validator control
      - You CAN observe the mempool, submit transactions before others, deploy contracts

      A REAL FINDING requires:
      - You reliably extract value from users or the protocol
      - Profit is non-trivial and repeatable
      - Attack is deterministic (not reliant on block timing luck)

      NOT A FINDING: permissionless races intended by protocol design (anyone can claim
      rewards, liquidate positions), MEV that is inherent and acknowledged.

      YOUR TASK — generate MEV/ORDERING attack narratives. Focus on:
      1. Sandwich attacks on swaps/deposits where victim's price impact is material
      2. Front-running liquidations where profit margin is significant
      3. Governance/parameter change front-running (act before effect takes place)
      4. Oracle update front-running (act on stale price before update lands on-chain)
      5. Deadline bypass or griefing (make victim txs expire or revert at low cost)
      6. State-race conditions where first-mover wins meaningful value over others
      7. Withdrawal queue front-running: see large withdrawal pending, drain liquidity first
      8. Permit front-running: see permit tx in mempool, front-run to drain allowance
         before the permit holder can use it
      9. Price update sandwiching: for any protocol with price updates (e.g. Chainlink
         push), act between the update tx and the user action that depends on the new price

      Read relevant functions before including a narrative.

      OUTPUT: Valid JSON array only. Empty array [] if nothing plausible found.

      [
        {
          "id": "ORD-01",
          "title": "concise attack title",
          "angle": "ordering_mev",
          "entry_point": "ContractName.sol:functionName():L123",
          "attacker": "MEV bot / unprivileged EOA",
          "preconditions": [],
          "preconditions_reachable": "",
          "steps": [],
          "root_cause": "one precise sentence",
          "estimated_profit": "dust|small|medium|large",
          "confidence": "high|medium|low"
        }
      ]

  - id: imagine_access
    name: "Stage 2c · Access Control Attacks"
    parallel: true
    tools: ["read", "glob"]
    max_turns: 20
    on_error: continue
    system_prompt: |
      You are an adversarial exploit developer specializing in access control flaws.
      You always read the actual modifier and role-check code. You never claim a
      function lacks access control without reading it.
    outputs:
      - name: output
        type: text
        save_to: "{{ inputs.repo_path }}/.clido-audit/narratives/imagine_access.json"
    prompt: |
      Read the code intelligence report: {{ inputs.repo_path }}/.clido-audit/intel.json
      Read intent gaps: {{ inputs.repo_path }}/.clido-audit/intent_gaps.json
      Repository: {{ inputs.repo_path }}
      {% if inputs.context != "" %}Protocol context: {{ inputs.context }}{% endif %}

      ATTACKER MODEL:
      - Completely unprivileged external EOA
      - If you attack a function that requires a role, the bug MUST be that the CHECK IS MISSING
        or INCORRECT — you are NOT assuming you already have the role

      A REAL FINDING requires:
      - Missing or incorrect access control allows unauthorized state change
      - The unauthorized state change leads to fund theft or protocol damage
      - The vulnerability is in the code (not "admin could do X")

      NOT A FINDING: functions that ARE correctly restricted, admin key compromise (out of scope),
      governance decisions, intentionally permissionless functions (reward claiming, liquidation).

      YOUR TASK — generate ACCESS CONTROL attack narratives. Focus on:
      1. Missing modifier on state-changing function (read the function — verify no onlyOwner/role)
      2. Incorrect role check (wrong address compared, inverted condition, wrong role name)
      3. Unguarded initializer (no initializer() modifier or _initialized flag)
      4. Implementation contract callable directly (proxy not initialized, can call initialize())
      5. Privilege escalation: can unprivileged user grant themselves a privileged role?
      6. Two-step ownership transfer with exploitable race (pending owner can be set by anyone?)
      7. Check any intent gaps flagged as missing_guard — read the function to confirm
      8. ERC2771 trusted forwarder: if a forwarder is trusted, does msg.sender extraction
         from calldata[-20:] allow spoofing? Can an attacker craft a malicious call via
         an untrusted forwarder that is mistakenly treated as trusted?
      9. Multicall + self-delegatecall: can msg.sender be manipulated through meta-tx patterns?
      10. Function selector collision in Diamond proxies: do any facet selectors collide,
          allowing a lower-privilege function to be called when a higher-privilege one is expected?

      Read every modifier and role check for each function you claim is unprotected.

      OUTPUT: Valid JSON array only. Empty array [] if nothing plausible found.

      [
        {
          "id": "ACC-01",
          "title": "concise attack title",
          "angle": "access_control",
          "entry_point": "ContractName.sol:functionName():L123",
          "attacker": "unprivileged external EOA",
          "preconditions": [],
          "preconditions_reachable": "",
          "steps": [],
          "root_cause": "one precise sentence",
          "estimated_profit": "dust|small|medium|large",
